name: Automatizare Real Olanda

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write  # CHEIA SUCCESULUI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install feedparser requests pytz

      - name: Run Bot
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.OLANDA_CHANNEL_ID }}
        run: python olanda_bot.py

      - name: 💾 Salvare Blacklist (Push)
        run: |
          git config --global user.name "Grigore-Bot-V2"
          git config --global user.email "bot@realolanda.ai"
          touch processed_links_olanda.txt
          git add processed_links_olanda.txt
          git commit -m "Update Olanda blacklist [skip ci]" || true
          git push
