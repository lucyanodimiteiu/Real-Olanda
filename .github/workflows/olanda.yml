name: Automatizare Real Olanda

on:
  schedule:
    - cron: '0 * * * *' # Rulează la fiecare oră fixă
  workflow_dispatch: {}

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # Botul are un while True, asa ca il limitam sa ruleze maxim 5 minute per sesiune
          # pentru a nu depasi limitele Github Actions.
          timeout 5m python olanda_bot.py || true
          
      - name: Commit state
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "OlandaBot"
          git add *.txt *.db || true
          git commit -m "Auto-update fisiere state" || echo "No changes"
          git push
